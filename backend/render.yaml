# render.yaml — Render Blueprint for Alpha E-com
# ──────────────────────────────────────────────────────────────────────────────
# Location note: Render looks for render.yaml at the repository ROOT by default.
# To use this file from backend/ you have two options:
#   a) Copy/move this file to the project root before connecting on Render.
#   b) In the Render Dashboard → Blueprint → "Render YAML path" field, type:
#      backend/render.yaml
# ──────────────────────────────────────────────────────────────────────────────
# Prerequisites:
#   1. A MongoDB Atlas cluster (free M0 tier works) with a user + IP whitelist
#      set to 0.0.0.0/0 (allow from anywhere) so Render's dynamic IPs can connect.
#   2. The following secrets set in the Render Dashboard (see docs/deployment.md):
#        MONGO_URI   — mongodb+srv://... connection string from Atlas
#        CORS_ORIGIN — https://alpha-ecom-api.onrender.com (after first deploy)
#   3. JWT_SECRET is auto-generated by Render (generateValue: true below).
# ──────────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: alpha-ecom-api
    env: node
    region: oregon          # nearest Render region — change to 'frankfurt' for EU
    plan: free              # free tier: service spins down after 15 min inactivity
    rootDir: backend        # commands run from backend/; repo root is still accessible
                            # so path.join(__dirname, '..', 'frontend') resolves correctly

    buildCommand: npm ci --only=production
    startCommand: node server.js

    # Render pings this path; non-200 triggers an incident.
    # /health is registered BEFORE the rate-limiter so pings don't consume quota.
    healthCheckPath: /health

    envVars:
      # PORT is injected automatically by Render — server.js already reads it.

      - key: NODE_ENV
        value: production

      # MongoDB Atlas connection string.
      # sync: false → must be set manually in the Render Dashboard.
      # Format: mongodb+srv://<user>:<pass>@<cluster>.mongodb.net/<dbname>?retryWrites=true&w=majority
      - key: MONGO_URI
        sync: false

      # Render generates a cryptographically random secret on first deploy.
      # You can override it in the Dashboard → Environment if needed.
      - key: JWT_SECRET
        generateValue: true

      # Comma-separated allowed CORS origins.
      # After the first deploy, set this to the live service URL, e.g.:
      #   https://alpha-ecom-api.onrender.com
      # sync: false → must be set manually in the Render Dashboard.
      - key: CORS_ORIGIN
        sync: false
